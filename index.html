<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Paula Araújo da Silva - Currículo</title>
    
    <!-- Fontes e ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            line-height: 1.6;
            padding: 2rem;
        }

        .curriculo-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        /* Header do Currículo */
        .curriculo-header {
            background: linear-gradient(135deg, #081a36 0%, #0f2f5f 40%, #2a5298 100%);
            color: white;
            padding: 2.5rem;
            position: relative;
        }

        .curriculo-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #10b981, #3b82f6, #8b5cf6);
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .profile-icon {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .profile-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-text h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .header-text h2 {
            font-size: 1.3rem;
            font-weight: 500;
            color: #bfdbfe;
            margin-bottom: 0.5rem;
        }

        .header-text p {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #e2e8f0;
            font-size: 1rem;
        }

        /* Grid principal do currículo */
        .curriculo-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            padding: 2rem;
        }

        /* Coluna esquerda */
        .coluna-esquerda {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1.5rem;
        }

        .secao {
            margin-bottom: 2rem;
        }

        .secao h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e3a8a;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .secao h3 i {
            color: #3b82f6;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
            color: #4b5563;
        }

        .info-item i {
            width: 20px;
            color: #3b82f6;
            font-size: 1.1rem;
        }

        .skill-tag {
            display: inline-block;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 0.3rem 1rem;
            margin: 0.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .skill-bar {
            margin-bottom: 1rem;
        }

        .skill-bar-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.3rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .skill-bar-progress {
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }

        .skill-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 10px;
        }

        /* Coluna direita */
        .coluna-direita {
            padding: 0.5rem;
        }

        .experiencia-item {
            margin-bottom: 1.8rem;
        }

        .experiencia-titulo {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e3a8a;
            margin-bottom: 0.3rem;
        }

        .experiencia-local {
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 0.3rem;
        }

        .experiencia-periodo {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .experiencia-descricao {
            list-style: none;
        }

        .experiencia-descricao li {
            margin-bottom: 0.5rem;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            font-size: 0.95rem;
            color: #4b5563;
        }

        .experiencia-descricao li i {
            color: #10b981;
            font-size: 0.9rem;
            margin-top: 0.2rem;
        }

        .formacao-item {
            margin-bottom: 1.5rem;
        }

        .formacao-titulo {
            font-weight: 700;
            color: #1e3a8a;
            margin-bottom: 0.2rem;
        }

        .formacao-instituicao {
            font-weight: 600;
            color: #4b5563;
            font-size: 0.95rem;
        }

        .formacao-periodo {
            color: #6b7280;
            font-size: 0.9rem;
            margin-top: 0.2rem;
        }

        .badge {
            display: inline-block;
            background: #e6f0ff;
            color: #1e3a8a;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .destaque {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-weight: 700;
            color: #92400e;
        }

        /* Botões de ação */
        .acoes {
            padding: 1.5rem 2rem;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: white;
            border: 2px solid #1e3a8a;
            color: #1e3a8a;
        }

        .btn-secondary:hover {
            background: #1e3a8a;
            color: white;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .curriculo-grid {
                grid-template-columns: 1fr;
            }
            
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            
            .acoes {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            
            .acoes {
                display: none;
            }
            
            .curriculo-container {
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <div class="curriculo-container">
        <!-- Header do Currículo -->
        <div class="curriculo-header">
            <div class="header-content">
                <div class="profile-icon">
                    <!-- LINK CORRETO DA FOTO (RAW) -->
                    <img src="https://raw.githubusercontent.com/AninhaTata/curriculo/main/foto%20(2).jpg" alt="Ana Paula">
                </div>
                <div class="header-text">
                    <h1>Ana Paula Araújo da Silva</h1>
                    <h2>Tecnóloga em Ciência de Dados | Especialista em Dashboards</h2>
                    <p><i class="fas fa-map-marker-alt"></i> Sapucaias, Contagem - MG</p>
                </div>
            </div>
        </div>

        <!-- Todo o resto do seu conteúdo permanece IGUAL -->
        <!-- ... (mantenha todo o conteúdo que você já tinha) ... -->

        <!-- Botões de ação (ATENÇÃO: link do PDF ainda precisa ser corrigido) -->
        <div class="acoes">
            <button class="btn btn-secondary" onclick="window.print()">
                <i class="fas fa-print"></i> Imprimir / Salvar PDF
            </button>
            <a href="#" onclick="alert('Você precisa fazer upload do PDF no GitHub e colocar o link aqui!')" class="btn btn-primary">
                <i class="fas fa-download"></i> Baixar Currículo (PDF)
            </a>
        </div>
    </div>
</body>
</html>
